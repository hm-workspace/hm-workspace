name: hm-local

networks:
  hm-net:
    driver: bridge

volumes:
  sqlserver-data:

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: hm-sqlserver
    environment:
      ACCEPT_EULA: 'Y'
      SA_PASSWORD: ${SA_PASSWORD:-Hm@123456}
    volumes:
      - sqlserver-data:/var/opt/mssql
    ports:
      - '${SQLSERVER_PORT:-1433}:1433'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "(/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P $$SA_PASSWORD -Q 'SELECT 1' || /opt/mssql-tools/bin/sqlcmd -C -S localhost -U sa -P $$SA_PASSWORD -Q 'SELECT 1') || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 45s
    networks:
      - hm-net

  redis:
    image: redis:7-alpine
    container_name: hm-redis
    ports:
      - '${REDIS_PORT:-6379}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - hm-net

  db-init:
    image: mcr.microsoft.com/mssql-tools
    container_name: hm-db-init
    environment:
      SA_PASSWORD: ${SA_PASSWORD:-Hm@123456}
      DB_SERVER: sqlserver
      DB_USER: sa
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ../../hm-database/db:/db:ro
      - ./db-init/init-db.sh:/init-db.sh:ro
    entrypoint:
      [
        '/bin/sh',
        '-c',
        "tr -d '\\r' < /init-db.sh > /tmp/init-db.sh && chmod +x /tmp/init-db.sh && /bin/sh /tmp/init-db.sh",
      ]
    restart: 'no'
    networks:
      - hm-net

  auth-service:
    build:
      context: ../../hm-auth-service
      dockerfile: Dockerfile
    container_name: hm-auth-service
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=healthplus;User ID=sa;Password=${SA_PASSWORD:-Hm@123456};TrustServerCertificate=True;MultipleActiveResultSets=True;
      JwtSettings__SecretKey: ${JWT_SECRET:-HospitalManagement_Local_JWT_Secret_ChangeMe_123!}
      JwtSettings__Issuer: ${JWT_ISSUER:-HospitalManagement}
      JwtSettings__Audience: ${JWT_AUDIENCE:-HospitalManagementUsers}
    depends_on:
      db-init:
        condition: service_completed_successfully
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - hm-net

  patient-service:
    build:
      context: ../../hm-patient-service
      dockerfile: Dockerfile
    container_name: hm-patient-service
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=healthplus;User ID=sa;Password=${SA_PASSWORD:-Hm@123456};TrustServerCertificate=True;MultipleActiveResultSets=True;
      JwtSettings__SecretKey: ${JWT_SECRET:-HospitalManagement_Local_JWT_Secret_ChangeMe_123!}
      JwtSettings__Issuer: ${JWT_ISSUER:-HospitalManagement}
      JwtSettings__Audience: ${JWT_AUDIENCE:-HospitalManagementUsers}
    depends_on:
      db-init:
        condition: service_completed_successfully
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - hm-net

  doctor-service:
