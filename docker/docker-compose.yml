  portal:
    build:
      context: ../../hm-portal
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${PORTAL_API_URL:-http://localhost:5000}
    container_name: hm-portal
    depends_on:
      - auth-service
      - patient-service
      - doctor-service
      - appointment-service
      - medical-records-service
      - department-service
      - staff-service
      - notification-service
    networks:
      - hm-net

  api-gateway:
    image: nginx:1.27-alpine
    container_name: hm-api-gateway
    depends_on:
      - portal
      - auth-service
      - patient-service
      - doctor-service
      - appointment-service
      - medical-records-service
      - department-service
      - staff-service
      - notification-service
    ports:
      - '${GATEWAY_PORT:-5000}:80'
    volumes:
      - ./nginx/api-gateway.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - hm-net
